<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Semana de Tecnologia IFAL</title>
</head>
<body>

    <h1>Inscrição - Semana de Tecnologia IFAL</h1>

    <form action="https://httpbin.org/post"
          method="post"
          enctype="multipart/form-data">

        <h2>Identificação do Participante</h2>

        <label for="nome">Nome completo:</label><br>
        <input type="text"
               id="nome"
               name="nome"
               required>
        <br><br>

        <label for="email">E-mail institucional:</label><br>
        <input type="email"
               id="email"
               name="email"
               required>
        <br><br>

        <label for="cidade">Cidade de origem:</label><br>
        <input type="text"
               id="cidade"
               name="cidade"
               list="cidades">
               
        <datalist id="cidades">
            <option value="Maceió">
            <option value="Arapiraca">
            <option value="Palmeira dos Índios">
            <option value="Rio Largo">
            <option value="Penedo">
            <option value="Delmiro Gouveia">
            <option value="União dos Palmares">
            <option value="Santana do Ipanema">
        </datalist>

        <br><br>

        <label for="foto">Foto para crachá:</label><br>

        <input type="file"
               id="foto"
               name="foto"
               accept="image/jpeg,image/png"
               aria-describedby="ajuda-foto">

        <small id="ajuda-foto">
            Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.
        </small>

        <br><br>

        <h2>Preferências para o Evento</h2>

        <label for="chegada">
            Data e hora preferida para chegada:
        </label><br>

        <input type="datetime-local"
               id="chegada"
               name="chegada">

        <br><br>

        <label for="experiencia">
            Nível de experiência:
            <span id="valor-experiencia">5</span>/10
        </label>

        <br>

        <input type="range"
               id="experiencia"
               name="experiencia"
               min="0"
               max="10"
               step="1"
               value="5"
               oninput="document.getElementById('valor-experiencia').textContent = this.value">

        <br><br>

        <label for="cor_camiseta">
            Cor de preferência para a camiseta:
        </label><br>

        <input type="color"
               id="cor_camiseta"
               name="cor_camiseta"
               value="#1a73e8">

        <br><br>

        <label for="oficinas">
            Oficinas de interesse:
        </label><br>

        <select id="oficinas"
                name="oficinas[]"
                multiple
                size="4"
                aria-describedby="ajuda-oficinas">

            <option value="html">HTML e CSS</option>
            <option value="javascript">JavaScript</option>
            <option value="python">Python</option>
            <option value="banco_dados">Banco de Dados</option>
            <option value="ia">Inteligência Artificial</option>
        </select>

        <br>

        <small id="ajuda-oficinas">
            Use Ctrl (ou Cmd no Mac) para selecionar mais de uma oficina.
        </small>

        <br><br>

        <input type="hidden"
               name="edicao"
               value="2026">

        <input type="submit"
               value="Confirmar inscrição">

    </form>

    <p><a href="index.html">← Voltar à página principal</a></p>
</body>
</html>
