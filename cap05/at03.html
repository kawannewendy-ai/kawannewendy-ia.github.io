<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário de Matrícula Acadêmica</title>
</head>
<body>

    <h1>Formulário de Matrícula Acadêmica</h1>

    <p><strong>* Campos obrigatórios</strong></p>

    <form action="https://httpbin.org/post" method="post">

        <fieldset>
            <legend>Dados Pessoais</legend>

            <label for="nome">Nome Completo *</label><br>
            <input type="text"
                   id="nome"
                   name="nome"
                   required
                   minlength="5"
                   maxlength="100">
            <br><br>

            <label for="cpf">CPF *</label><br>
            <input type="text"
                   id="cpf"
                   name="cpf"
                   required
                   pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
                   placeholder="000.000.000-00"
                   title="CPF no formato 000.000.000-00">
            <br><br>

            <label for="telefone">Telefone</label><br>
            <input type="tel"
                   id="telefone"
                   name="telefone"
                   pattern="\(\d{2}\)\s\d{4,5}-\d{4}"
                   placeholder="(82) 99999-9999">
            <br><br>

            <label for="email">E-mail *</label><br>
            <input type="email"
                   id="email"
                   name="email"
                   required>
        </fieldset>

        <br>

        <fieldset>
            <legend>Dados Acadêmicos</legend>

            <label for="curso">Curso *</label><br>

            <select id="curso" name="curso" required>
                <option value="">Selecione um curso</option>

                <optgroup label="Computação">
                    <option value="sistemas">Sistemas de Informação</option>
                    <option value="ciencia">Ciência da Computação</option>
                    <option value="engenharia">Engenharia da Computação</option>
                </optgroup>

                <optgroup label="Gestão">
                    <option value="administracao">Administração</option>
                    <option value="contabeis">Ciências Contábeis</option>
                </optgroup>
            </select>

            <br><br>

            <fieldset>
                <legend>Período</legend>

                <input type="radio"
                       id="manha"
                       name="periodo"
                       value="manha">

                <label for="manha">Manhã</label>

                <input type="radio"
                       id="tarde"
                       name="periodo"
                       value="tarde">

                <label for="tarde">Tarde</label>

                <input type="radio"
                       id="noite"
                       name="periodo"
                       value="noite">

                <label for="noite">Noite</label>
            </fieldset>

            <br>

            <label for="ano_ingresso">Ano de ingresso *</label><br>
            <input type="number"
                   id="ano_ingresso"
                   name="ano_ingresso"
                   min="2025"
                   max="2030"
                   required>
        </fieldset>

        <br>

        <fieldset>
            <legend>Áreas de Interesse</legend>

            <input type="checkbox" id="web" name="interesses[]" value="web">
            <label for="web">Desenvolvimento Web</label><br>

            <input type="checkbox" id="bd" name="interesses[]" value="bd">
            <label for="bd">Banco de Dados</label><br>

            <input type="checkbox" id="ia" name="interesses[]" value="ia">
            <label for="ia">Inteligência Artificial</label><br>

            <input type="checkbox" id="seguranca" name="interesses[]" value="seguranca">
            <label for="seguranca">Segurança da Informação</label><br>

            <input type="checkbox" id="infraestrutura" name="interesses[]" value="infraestrutura">
            <label for="infraestrutura">Infraestrutura</label>
        </fieldset>

        <br>

        <input type="submit" value="Solicitar matrícula">
        <input type="reset" value="Limpar formulário">

    </form>

    <p><a href="index.html">← Voltar à página principal</a></p>
</body>
</html>
