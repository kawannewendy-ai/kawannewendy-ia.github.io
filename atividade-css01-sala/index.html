
<html>
  <head>
</head>
<body>

	<link rel="stylesheet" href="style.css">
<header>
    <h1 id="cabecalho-principal">Atividade de CSS</h1>
    <p class="p1">Página direcionada ao cadastro de clientes para uma loja virtual de perfumes.</p>
  </header>

  	<main>

  <form action="https://httpbin.org/post" method="POST">

    <h1 id="titulo">Cadastro de cliente</h1>

    <label for="nome">Nome completo:</label>
    <input type="text" id="nome" name="nome" required minlength="3">
    
    <fieldset>
      <legend>Gênero</legend>

      <label><input type="radio" name="genero" value="masculino"> Masculino</label><br>
      <label><input type="radio" name="genero" value="feminino"> Feminino</label><br>
      <label><input type="radio" name="genero" value="outro"> Outro</label><br>
      <label><input type="radio" name="genero" value="prefiro_nao_informar"> Prefiro não informar</label>

    </fieldset>

    <label for="email">E-mail:</label>
    <input type="email" id="email" name="email" required>

    <label for="Telefone">Telefone:</label>
    <input type="tel" id="telefone" name="Telefone" required minlength="8">
    
    <label for="CPF">CPF:</label>
    <input type="number" id="cpf" name="CPF" required>

<label for="nascimento">Data de nascimento:</label>
    <input type="date" id="nascimento" name="nascimento" required>

    <label for="endereço">Endereço:</label>
    <input type="text" id="endereco" name="Endereço" required>
    
    <label>
      <input type="checkbox" name="aceite" value="sim" required>
      Aceito os termos de uso
    </label>

    <br></br>

    <button type="submit">Criar conta</button>
    <button type="reset">Limpar campos</button>
   
  <label for="comentario">Comentários:</label>
  <br>
  <textarea id="comentario" name="comentario" rows="5" cols="40" placeholder="Digite aqui a sua opinião sobre nosso serviço..."></textarea>
 <br>
  <button type="submit">Enviar</button>

  </form>
	</main>
		<footer>
<p class="p2"> Nome das integrantes: Júlia e Kawanne. </p>
<p class="p2"> Disciplina: Programação Web 1 </p>
<p class="p2"> Data da atividade: 02/06/2026 </p>
		<footer>
</body>
</html>
