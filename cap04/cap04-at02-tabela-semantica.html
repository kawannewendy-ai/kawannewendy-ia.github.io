<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Tabela Semântica</title>

    <style>

        table{
            width: 900px;
            margin: auto;
            border-collapse: collapse;
            background-color: white;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.2);
            width: 100%;
            border-collapse: collapse;
        background-color: blueviolet;
        }
        th,
        td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;

        table} 
  
</style>

<body>

    <table>

        <caption>
            Notas Bimestrais - Turma A - 2026
        </caption>

        <thead>

            <tr>

                <th rowspan="2" scope="col">
                    Aluno
                </th>

                <th colspan="4" scope="col">
                    Bimestres
                </th>

                <th rowspan="2" scope="col">
                    Média Final
                </th>

            </tr>

            <tr>

                <th scope="col">1º Bimestre</th>
                <th scope="col">2º Bimestre</th>
                <th scope="col">3º Bimestre</th>
                <th scope="col">4º Bimestre</th>

            </tr>

        </thead>

        <tbody>

            <tr>
                <th scope="row">Caroline</th>
                <td>8</td>
                <td>7</td>
                <td>9</td>
                <td>10</td>
                <td>8.5</td>
            </tr>

            <tr>
                <th scope="row">Gabriel</th>
                <td>9</td>
                <td>9</td>
                <td>9</td>
                <td>9</td>
                <td>9.0</td>
            </tr>

            <tr>
                <th scope="row">Maya</th>
                <td>9</td>
                <td>9</td>
                <td>10</td>
                <td>8</td>
                <td>9.0</td>
            </tr>

            <tr>
                <th scope="row">Kawã</th>
                <td>10</td>
                <td>10</td>
                <td>10</td>
                <td>9</td>
                <td>9.75</td>
            </tr>

            <tr>
                <th scope="row">Carol</th>
                <td>10</td>
                <td>9</td>
                <td>8</td>
                <td>10</td>
                <td>9.25</td>
            </tr>

            <tr>
                <th scope="row">Miguel</th>
                <td>7</td>
                <td>8</td>
                <td>7</td>
                <td>9</td>
                <td>7.75</td>
            </tr>

        </tbody>

        <tfoot>

            <tr>

                <th scope="row">
                    Média da turma
                </th>

                <td>8.8</td>
                <td>8.6</td>
                <td>8.8</td>
                <td>9.16</td>
                <td>8.8</td>

            </tr>

        </tfoot>

    </table>

<p><a href="index.html">← Voltar à página principal</a></p>
</body>
</html>
